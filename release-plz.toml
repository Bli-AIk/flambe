# Release-plz configuration

[workspace]
allow_dirty = true
# Skip `cargo update` since path dependencies (../bevy_alight_motion, ../bevy_workbench)
# are outside this repository and not available in release-plz's temp directory.
dependencies_update = false
pr_name = "chore{% if package and version %}: release {{ package }} v{{ version }}{% elif packages %}: release ({{ packages | length }} packages updated){% else %}: release{% endif %}"

[[package]]
name = "flambe"
# Binary editor application — use GitHub releases only, not crates.io.
publish = false
git_release_enable = true

[changelog]
commit_parsers = [
    { message = ".*release.*", skip = true },
    { message = "^chore: release", skip = true },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^Merge pull request", skip = true },
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^chore", group = "Miscellaneous Tasks" },
    { message = "^.*", group = "Other" },
]
